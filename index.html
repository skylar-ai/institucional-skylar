<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Skylar</title>
    <script>
        const lang = (navigator.language || 'pt').toLowerCase();
        if (lang.startsWith('es')) {
            window.location.replace('skylar-subtitulos-en-vivo-es.pdf');
        } else if (lang.startsWith('pt')) {
            window.location.replace('skylar-legendas-ao-vivo.pdf');
        } else {
            window.location.replace('skylar-real-time-subtitles-en.pdf');
        }
    </script>
</head>
<body></body>
</html>
